name: publish

permissions:
  contents: write

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag from README badge
        id: readme_tag
        shell: bash
        run: |
          TAG=$(grep -oP 'https://img\.shields\.io/badge/tag-\K[^-)]+' README.md | head -n 1)
          if [ -z "$TAG" ]; then
            echo "Failed to parse tag from README badge."
            exit 1
          fi
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
          echo "Parsed tag: $TAG"

      - name: Create and push tag if missing
        id: ensure_tag
        shell: bash
        env:
          TAG_NAME: ${{ steps.readme_tag.outputs.tag_name }}
        run: |
          if git show-ref --tags --verify --quiet "refs/tags/$TAG_NAME"; then
            echo "Tag already exists locally: $TAG_NAME"
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          elif git ls-remote --exit-code --tags origin "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag already exists on remote: $TAG_NAME"
            git fetch --tags
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
            echo "Created and pushed tag: $TAG_NAME"
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.ensure_tag.outputs.tag_exists != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        if: steps.ensure_tag.outputs.tag_exists != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        if: steps.ensure_tag.outputs.tag_exists != 'true'
        run: |
          pyinstaller MaimaiScorePicGenerator.spec

      - name: Upload release artifacts
        if: steps.ensure_tag.outputs.tag_exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.readme_tag.outputs.tag_name }}
          files: |
            dist/MaimaiScorePicGenerator.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
